name: Hotelistan CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy to Firebase
        # This step will fail at first because we haven't linked Firebase keys yet.
        # THIS IS PERFECT for your "Failed Run" screenshot!
        run: npx firebase-tools deploy --token ${{ secrets.FIREBASE_TOKEN }}
